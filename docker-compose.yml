services:
  app:
    container_name: almacen-digital-app
    build:
      context: .
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
      DB_HOST: db
      DB_NAME: almacensekai
      DB_USER: almacen_user
      DB_PASSWORD: almacen_password
      DB_CHARSET: utf8mb4
      ALLOWED_ORIGIN: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/api/config.php >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    container_name: almacen-digital-db
    image: mysql:8.4
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: almacensekai
      MYSQL_USER: almacen_user
      MYSQL_PASSWORD: almacen_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./productos_sinTamano.sql:/docker-entrypoint-initdb.d/01_catalogo_productos.sql:ro
      - ./scripts/importar_catalogo_dimensiones.sql:/docker-entrypoint-initdb.d/02_importar_catalogo_dimensiones.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
