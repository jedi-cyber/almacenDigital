services:
  app:
    container_name: almacen-digital-app
    build:
      context: .
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
      DB_HOST: db
      DB_NAME: almacensekai
      DB_USER: almacen_user
      DB_PASSWORD: almacen_password
      DB_CHARSET: utf8mb4
      # Web origin plus the Android WebView origin, so the embedded 3D viewer passes CORS.
      ALLOWED_ORIGIN: http://localhost:8080,https://appassets.androidplatform.net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/api/config.php >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    container_name: almacen-digital-db
    # MariaDB to match the exported dump (MariaDB syntax) and typical XAMPP dev setups.
    image: mariadb:11.4
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: almacensekai
      MYSQL_USER: almacen_user
      MYSQL_PASSWORD: almacen_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
      # Any *.sql / *.sh placed in db/init runs on first boot (alphabetical order).
      # Drop your almacensekai dump there. Dumps are gitignored (they hold credentials).
      - ./db/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
